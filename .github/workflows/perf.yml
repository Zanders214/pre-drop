name: Performance Benchmark

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: nanobench
    runs-on: ubuntu-latest          # single runner only — cross-OS numbers aren't comparable
    steps:
      - uses: actions/checkout@v4

      - name: JUCE Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libglu1-mesa-dev mesa-common-dev

      - uses: lukka/get-cmake@latest

      - name: Cache JUCE (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-${{ runner.os }}-8.0.4

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPREDROP_BUILD_BENCH=ON

      - name: Build perf_bench
        run: cmake --build build --target perf_bench --parallel

      - name: Run benchmark
        run: |
          BIN=$(find build -type f -name perf_bench -path '*_artefacts*' | head -1)
          echo "Running $BIN"
          xvfb-run -a "$BIN" bench_result.json

      - uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ZandersPreDrop DSP
          tool: customSmallerIsBetter
          output-file-path: bench_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          # publish data only from the integration branches; PRs just compare + comment
          auto-push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' }}
          comment-on-alert: true
          fail-on-alert: true
          alert-threshold: '150%'          # generous, to absorb shared-runner noise
          summary-always: true
